<!doctype html>
<html xmlns:th="http:www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Department Employees</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>Department Employees</h1>

      <form th:action="@{/employee}" method="get" class="search-box">
        <select name="department" id="department" required>
          <option
            value=""
            disabled
            th:selected="${currentDepartment == null}"
            hidden
          >
            Select a department...
          </option>
          <option>-- All Departments --</option>
          <option
            th:each="dpt : ${allDepartments}"
            th:value="${dpt}"
            th:text="${dpt}"
            th:selected="${dpt == currentDepartment}"
          >
            Department
          </option>
        </select>
        <button type="submit">Search</button>
      </form>

      <h2
        th:text="${currentDepartment != null and !#strings.isEmpty(currentDepartment)}
                   ? 'Department: ' + ${currentDepartment}
                   : 'Department: All'"
      >
        Department: All
      </h2>

      <div th:if="${not #lists.isEmpty(employeeList)}">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Department</th>
              <th>Start Date</th>
              <th>Job Title</th>
            </tr>
          </thead>
          <tbody>
            <tr
              th:each="emp : ${employeeList}"
              th:class="${oldest != null and emp.id == oldest.id} ? 'oldest-employee' : ''"
            >
              <td th:text="${emp.id}">1</td>
              <td th:text="${emp.firstName}">Paola</td>
              <td th:text="${emp.lastName}">Witrago</td>
              <td th:text="${emp.department}">Technology</td>
              <td th:text="${emp.startDate}">2026-01-31</td>
              <td th:text="${emp.jobTitle}">Software Engineer</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td
                colspan="5"
                style="
                  text-align: right;
                  font-weight: bold;
                  text-transform: uppercase;
                "
              >
                Total Employees:
              </td>
              <td
                style="font-weight: bold; text-align: left"
                th:text="${totalEmployees}"
              >
                1
              </td>
            </tr>
            <tr th:if="${oldest != null}">
              <td
                colspan="5"
                style="
                  text-align: right;
                  font-weight: bold;
                  text-transform: uppercase;
                "
              >
                Most Senior Employee:
              </td>
              <td
                style="font-weight: bold; text-align: left"
                th:text="${oldest.getFirstName()} + ' ' + ${oldest.getLastName()}"
              >
                Paola Witrago
              </td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div
        th:if="${#lists.isEmpty(employeeList)}"
        style="
          text-align: center;
          padding: 30px;
          background-color: #27273a;
          border-radius: 6px;
          margin-top: 20px;
        "
      >
        No records found.
      </div>
    </div>
  </body>
</html>
